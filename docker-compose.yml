services:
  voxcpm-server:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./data:/data
      - ${VOXCPM_MODEL_PATH:-./models}:/models
    environment:
      - VOXCPM_MODEL_PATH=/models/VoxCPM2
      - VOXCPM_DATA_DIR=/data
      - VOXCPM_DEVICES=${VOXCPM_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
